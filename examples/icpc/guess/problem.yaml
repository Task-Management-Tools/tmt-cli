title: Guess
short_name: guess
description: Guess a number between 1 and 1024

input_extension: .in
output_extension: .ans

judge_convention: icpc
problem_type: interactive

validator:
  type: default

solution:
  type: default
  time_limit: 1000 ms
  memory_limit: 2 G
  output_limit: 8 MB

answer_generation: 
  type: solution
  filename: sol.cpp

interactor:
  filename: checker.cc

tmt_version: 0.0.0
