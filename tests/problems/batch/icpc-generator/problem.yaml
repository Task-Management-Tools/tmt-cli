title: Generator test
short_name: gentest
description: Generator test (the testcases are A + B Problem)

input_extension: .in
output_extension: .out

judge_convention: icpc
problem_type: batch

validator:
  type: default

solution:
  type: default
  time_limit: 1000 ms
  memory_limit: 1 G
  output_limit: unlimited

answer_generation:
  type: solution
  filename: model-solution.cpp

compile_time_limit: 60 s
compile_memory_limit: unlimited

tmt_version: latest
