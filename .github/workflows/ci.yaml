name: Auto-run test/lint/format

on: [push]

jobs:
  pytest_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.13"]
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies # TODO: put it in requirements.txt or pyproject.yaml
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml pytest
    - name: Run pytest
      run: |
        python -m pytest

  ruff_lint_format_check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install ruff without running check or format
      uses: astral-sh/ruff-action@v3
      with:
        args: "--version"
    - name: Run ruff
      run: |
        ruff check .
        ruff format --check .
  # TODO add mypy as well
